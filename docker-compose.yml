services:
  mysql:
    image: mysql:8.4
    restart: "no"
    environment:
      MYSQL_DATABASE: dbotter
      MYSQL_USER: dbotter
      MYSQL_PASSWORD: dbotter-local-only
      MYSQL_ROOT_PASSWORD: root-local-only
      # Health checks and in-container official-client verification use the
      # environment instead of exposing the password in process arguments.
      MYSQL_PWD: dbotter-local-only
    ports:
      - "127.0.0.1:33306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--host=127.0.0.1", "--user=dbotter", "--silent"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 10s
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    restart: "no"
    ports:
      - "127.0.0.1:36379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - redis-data:/data

  redis-auth:
    image: redis:7.4-alpine
    restart: "no"
    environment:
      REDISCLI_AUTH: dbotter-redis-local-only
    command:
      - redis-server
      - --requirepass
      - dbotter-redis-local-only
      - --save
      - ""
    ports:
      - "127.0.0.1:36380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  redis-tls-auth:
    image: redis:7.4-alpine
    restart: "no"
    environment:
      REDISCLI_AUTH: dbotter-redis-local-only
    command:
      - redis-server
      - --port
      - "0"
      - --tls-port
      - "6379"
      - --tls-cert-file
      - /tls/server.pem
      - --tls-key-file
      - /tls/server-key.pem
      - --tls-ca-cert-file
      - /tls/ca.pem
      - --tls-auth-clients
      - "no"
      - --requirepass
      - dbotter-redis-local-only
      - --save
      - ""
    ports:
      - "127.0.0.1:36381:6379"
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--tls",
          "--cacert",
          "/tls/ca.pem",
          "-h",
          "localhost",
          "--sni",
          "localhost",
          "ping",
        ]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - ./artifacts/redis-tls:/tls:ro

  mongodb:
    image: mongo:8.0
    restart: "no"
    profiles: ["mongodb"]
    ports:
      - "127.0.0.1:37017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 3s
      timeout: 3s
      retries: 30
    volumes:
      - mongodb-data:/data/db

volumes:
  mysql-data:
  redis-data:
  mongodb-data:
