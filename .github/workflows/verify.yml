name: Reusable verification

on:
  workflow_call:
    inputs:
      candidate_sha:
        description: Exact source commit to verify
        required: true
        type: string

permissions:
  contents: read

jobs:
  hermetic:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.candidate_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: verify-hermetic-${{ inputs.candidate_sha }}

      - name: Verify exact source and hermetic contracts
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: ./scripts/verify-hermetic.sh --expected-sha "${{ inputs.candidate_sha }}"

      - name: Upload source verification receipt
        uses: actions/upload-artifact@v4
        with:
          name: source-verification
          path: artifacts/source-verification.json
          if-no-files-found: error

  live:
    needs: hermetic
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.candidate_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: verify-live-${{ inputs.candidate_sha }}

      - name: Run mandatory live contracts
        env:
          DBOTTER_COMPOSE_PROJECT: dbotter-e2e
          DBOTTER_MYSQL_PASSWORD: dbotter-local-only
          DBOTTER_REDIS_PASSWORD: dbotter-redis-local-only
        run: ./scripts/verify-live-contracts.sh --config config/local.example.toml --expected-sha "${{ inputs.candidate_sha }}"

      - name: Upload live verification receipt
        uses: actions/upload-artifact@v4
        with:
          name: live-contract-verification
          path: artifacts/live-contract-receipt.json
          if-no-files-found: error
