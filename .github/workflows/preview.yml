name: Preview

# Publishes a prerelease `preview-<YYYY-MM-DD-HHMM>-<sha12>` with four
# desktop-capable binaries plus SHA256SUMS on every main/master push.

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: preview-publish
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build_id: ${{ steps.plan.outputs.build_id }}
      tag: ${{ steps.plan.outputs.tag }}
      commit: ${{ steps.plan.outputs.commit }}
      version: ${{ steps.plan.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check release contract
        run: ./scripts/check-release-contract.sh

      - name: Compute build identity
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          stamp="$(date -u +%Y-%m-%d-%H%M)"
          build_id="$stamp-$short_sha"
          cargo_version="$(./scripts/package-version.sh)"
          {
            echo "commit=$commit"
            echo "build_id=$build_id"
            echo "tag=preview-$build_id"
            echo "version=$cargo_version"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: preflight
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: dbotter-macos-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: dbotter-macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: dbotter-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: dbotter-linux-aarch64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    env:
      DBOTTER_BUILD_CHANNEL: preview
      DBOTTER_BUILD_ID: ${{ needs.preflight.outputs.build_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.commit }}
          persist-credentials: false

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: preview-${{ matrix.target }}

      - name: Build desktop binary
        run: cargo build --release --all-features --locked --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: cp "target/${{ matrix.target }}/release/dbotter" "${{ matrix.name }}"

      - name: Verify embedded preview identity
        if: runner.arch == 'X64' && matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          actual="$("./${{ matrix.name }}" --version)"
          expected="dbotter ${{ needs.preflight.outputs.version }} (preview $DBOTTER_BUILD_ID)"
          test "$actual" = "$expected"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  publish:
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAP_DISPATCH_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          for asset in dbotter-macos-aarch64 dbotter-macos-x86_64 dbotter-linux-aarch64 dbotter-linux-x86_64; do
            cp "artifacts/$asset/$asset" "release/$asset"
          done
          (cd release && sha256sum dbotter-* > SHA256SUMS)
          cat release/SHA256SUMS
          {
            echo "Preview build \`${{ needs.preflight.outputs.build_id }}\` from \`${{ needs.preflight.outputs.commit }}\`."
            echo
            echo "Install: \`brew install 2lab-ai/tap/dbotter-preview\`"
            echo
            echo '```'
            cat release/SHA256SUMS
            echo '```'
          } > PREVIEW_NOTES.md

      - name: Create preview prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          name: Preview build ${{ needs.preflight.outputs.build_id }}
          body_path: PREVIEW_NOTES.md
          prerelease: true
          make_latest: false
          target_commitish: ${{ needs.preflight.outputs.commit }}
          files: |
            release/dbotter-macos-aarch64
            release/dbotter-macos-x86_64
            release/dbotter-linux-aarch64
            release/dbotter-linux-x86_64
            release/SHA256SUMS

      - name: Prune old preview prereleases (keep 15)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName,isPrerelease,createdAt > preview-releases.json
          python3 - <<'PY' > old-preview-tags.txt
          import json
          with open("preview-releases.json", encoding="utf-8") as handle:
              releases = json.load(handle)
          previews = [
              release for release in releases
              if release.get("isPrerelease")
              and str(release.get("tagName", "")).startswith("preview-")
          ]
          previews.sort(key=lambda release: str(release.get("createdAt", "")), reverse=True)
          for release in previews[15:]:
              print(release["tagName"])
          PY
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
          done < old-preview-tags.txt

      - name: Bump Homebrew tap to this preview
        if: ${{ env.TAP_DISPATCH_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.TAP_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run bump.yml --repo 2lab-ai/homebrew-tap
          echo "dispatched homebrew-tap bump.yml for ${{ needs.preflight.outputs.tag }}"
