name: Release

# Stable release on v*. The tag without `v` must exactly match Cargo.toml.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      commit: ${{ steps.plan.outputs.commit }}
      build_id: ${{ steps.plan.outputs.build_id }}
      version: ${{ steps.plan.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check release contract
        run: ./scripts/check-release-contract.sh

      - name: Verify tag and compute build identity
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          cargo_version="$(./scripts/package-version.sh)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$GITHUB_REF_NAME" = "$tag_version" ] || [ "$cargo_version" != "$tag_version" ]; then
            echo "error: tag $GITHUB_REF_NAME must exactly match Cargo.toml version $cargo_version as v$cargo_version" >&2
            exit 1
          fi
          commit="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          {
            echo "commit=$commit"
            echo "version=$cargo_version"
            echo "build_id=$GITHUB_REF_NAME-$short_sha"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: preflight
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: dbotter-macos-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: dbotter-macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: dbotter-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: dbotter-linux-aarch64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    env:
      DBOTTER_BUILD_CHANNEL: stable
      DBOTTER_BUILD_ID: ${{ needs.preflight.outputs.build_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.commit }}
          persist-credentials: false

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build desktop binary
        run: cargo build --release --all-features --locked --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: cp "target/${{ matrix.target }}/release/dbotter" "${{ matrix.name }}"

      - name: Verify embedded stable identity
        if: runner.arch == 'X64' && matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          actual="$("./${{ matrix.name }}" --version)"
          expected="dbotter ${{ needs.preflight.outputs.version }} (stable $DBOTTER_BUILD_ID)"
          test "$actual" = "$expected"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  publish:
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          for asset in dbotter-macos-aarch64 dbotter-macos-x86_64 dbotter-linux-aarch64 dbotter-linux-x86_64; do
            cp "artifacts/$asset/$asset" "release/$asset"
          done
          (cd release && sha256sum dbotter-* > SHA256SUMS)
          cat release/SHA256SUMS

      - name: Create stable release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: false
          make_latest: true
          files: |
            release/dbotter-macos-aarch64
            release/dbotter-macos-x86_64
            release/dbotter-linux-aarch64
            release/dbotter-linux-x86_64
            release/SHA256SUMS
