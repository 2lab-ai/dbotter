name: Preview

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: preview-publish
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/verify.yml
    with:
      candidate_sha: ${{ github.sha }}

  plan:
    needs: verify
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      build_id: ${{ steps.plan.outputs.build_id }}
      tag: ${{ steps.plan.outputs.tag }}
      commit: ${{ steps.plan.outputs.commit }}
      version: ${{ steps.plan.outputs.version }}
      package_version: ${{ steps.plan.outputs.package_version }}
      created_at: ${{ steps.plan.outputs.created_at }}
      current_version: ${{ steps.plan.outputs.current_version }}
      manifest_url: ${{ steps.plan.outputs.manifest_url }}
    steps:
      - name: Checkout verified candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Compute immutable preview identity
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-parse HEAD)"
          test "$commit" = "${{ github.sha }}"
          short_sha="${commit:0:12}"
          stamp="$(date -u +%Y-%m-%d-%H%M%S)"
          build_id="$stamp-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT-$short_sha"
          tag=preview-$build_id
          version="${stamp:0:4}.${stamp:5:2}.${stamp:8:2}.${stamp:11:6}.$GITHUB_RUN_ID.$GITHUB_RUN_ATTEMPT"
          created_at="${stamp:0:4}-${stamp:5:2}-${stamp:8:2}T${stamp:11:2}:${stamp:13:2}:${stamp:15:2}Z"
          package_version="$(./scripts/package-version.sh)"
          formula_content="$(gh api repos/2lab-ai/homebrew-tap/contents/Formula/dbotter-preview.rb --jq .content | tr -d '\n' | base64 --decode)"
          current_version="$(sed -n 's/^[[:space:]]*version "\([0-9.]*\)".*/\1/p' <<<"$formula_content" | head -1)"
          test -n "$current_version"
          ./scripts/check-preview-version.py --candidate "$version" --greater-than "$current_version"
          manifest_url="https://github.com/$GITHUB_REPOSITORY/releases/download/$tag/preview-manifest.json"
          {
            echo "commit=$commit"
            echo "build_id=$build_id"
            echo "tag=$tag"
            echo "version=$version"
            echo "package_version=$package_version"
            echo "created_at=$created_at"
            echo "current_version=$current_version"
            echo "manifest_url=$manifest_url"
          } >>"$GITHUB_OUTPUT"

  build:
    needs: [verify, plan]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
            host_arch: arm64
            os: macos-15
            kind: macos
          - target: x86_64-apple-darwin
            arch: x86_64
            host_arch: x86_64
            os: macos-15-intel
            kind: macos
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            host_arch: aarch64
            os: ubuntu-24.04-arm
            kind: linux
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
            host_arch: x86_64
            os: ubuntu-24.04
            kind: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      DBOTTER_BUILD_CHANNEL: preview
      DBOTTER_BUILD_ID: ${{ needs.plan.outputs.build_id }}
      DBOTTER_SOURCE_SHA: ${{ needs.plan.outputs.commit }}
      DBOTTER_EXPECTED_SOURCE_SHA: ${{ needs.plan.outputs.commit }}
      DBOTTER_EXPECTED_TAG: ${{ needs.plan.outputs.tag }}
    steps:
      - name: Checkout verified candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify native runner architecture
        shell: bash
        run: test "$(uname -m)" = "${{ matrix.host_arch }}"

      - name: Install Linux desktop build dependencies
        if: matrix.kind == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: preview-${{ matrix.target }}-${{ needs.plan.outputs.commit }}

      - name: Build exact all-feature target
        run: cargo build --release --all-features --locked --target "${{ matrix.target }}"

      - name: Verify exact binary contracts
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/dbotter"
          identity="$($binary version --format json)"
          config="$($binary config-contract --format json)"
          jq -e \
            --arg package_version "${{ needs.plan.outputs.package_version }}" \
            --arg build_id "$DBOTTER_BUILD_ID" \
            --arg source_sha "$DBOTTER_SOURCE_SHA" \
            --arg target "${{ matrix.target }}" \
            --arg arch "${{ matrix.arch }}" '
              (keys | sort) == ["arch", "build_id", "channel", "package_version", "source_sha", "target"]
              and .package_version == $package_version
              and .channel == "preview"
              and .build_id == $build_id
              and .source_sha == $source_sha
              and .target == $target
              and .arch == $arch
            ' <<<"$identity" >/dev/null
          jq -e '
            (keys | sort) == ["migration_backup_suffix", "read_versions", "write_version"]
            and .read_versions == [1, 2]
            and .write_version == 2
            and .migration_backup_suffix == ".v1.bak"
          ' <<<"$config" >/dev/null

      - name: Package signed macOS app
        if: matrix.kind == 'macos'
        run: |
          mkdir -p out
          ./scripts/build-macos-app.sh \
            --channel preview \
            --binary "target/${{ matrix.target }}/release/dbotter" \
            --output out

      - name: Stage Linux executable
        if: matrix.kind == 'linux'
        run: |
          mkdir -p out
          cp "target/${{ matrix.target }}/release/dbotter" "out/dbotter-preview-linux-${{ matrix.arch }}"
          chmod 0755 "out/dbotter-preview-linux-${{ matrix.arch }}"

      - name: Upload macOS package
        if: matrix.kind == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.arch }}
          path: |
            out/dbotter-preview-${{ matrix.arch }}.tar.gz
            out/preview-artifact-${{ matrix.arch }}.json
            out/package-receipt-${{ matrix.arch }}.json
          if-no-files-found: error

      - name: Upload Linux executable
        if: matrix.kind == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: package-linux-${{ matrix.arch }}
          path: out/dbotter-preview-linux-${{ matrix.arch }}
          if-no-files-found: error

  publish:
    needs: [verify, plan, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      manifest_sha256: ${{ steps.manifest.outputs.manifest_sha256 }}
    steps:
      - name: Checkout verified candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download target artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble and validate immutable release files
        id: manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp artifacts/package-aarch64/dbotter-preview-aarch64.tar.gz release/
          cp artifacts/package-x86_64/dbotter-preview-x86_64.tar.gz release/
          cp artifacts/package-linux-aarch64/dbotter-preview-linux-aarch64 release/
          cp artifacts/package-linux-x86_64/dbotter-preview-linux-x86_64 release/
          ./scripts/assemble-preview-manifest.py \
            --artifact artifacts/package-aarch64/preview-artifact-aarch64.json \
            --artifact artifacts/package-x86_64/preview-artifact-x86_64.json \
            --output release/preview-manifest.json
          ./scripts/validate-preview-manifest.py \
            release/preview-manifest.json \
            --expected-source-sha "${{ needs.plan.outputs.commit }}" \
            --expected-tag "${{ needs.plan.outputs.tag }}" \
            --greater-than "${{ needs.plan.outputs.current_version }}"
          manifest_sha256="$(sha256sum release/preview-manifest.json | awk '{print $1}')"
          echo "manifest_sha256=$manifest_sha256" >>"$GITHUB_OUTPUT"
          chmod 0755 release/dbotter-preview-linux-*
          (cd release && sha256sum dbotter-preview-* preview-manifest.json >SHA256SUMS)

      - name: Reject tag or release replacement
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/${{ needs.plan.outputs.tag }}" >/dev/null 2>&1; then
            echo "tag already exists; immutable preview replacement refused" >&2
            exit 1
          fi
          if gh release view "${{ needs.plan.outputs.tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release already exists; immutable preview replacement refused" >&2
            exit 1
          fi

      - name: Write safe release notes
        shell: bash
        run: |
          {
            echo "Preview ${{ needs.plan.outputs.tag }}"
            echo
            echo "Source: ${{ needs.plan.outputs.commit }}"
            echo "Homebrew version: ${{ needs.plan.outputs.version }}"
            echo "Manifest: ${{ needs.plan.outputs.manifest_url }}"
            echo
            echo 'Install with `brew install 2lab-ai/tap/dbotter-preview` after the explicit tap dispatch completes.'
          } >PREVIEW_NOTES.md

      - name: Create immutable preview prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.tag }}
          name: Dbotter Preview ${{ needs.plan.outputs.version }}
          body_path: PREVIEW_NOTES.md
          prerelease: true
          make_latest: false
          target_commitish: ${{ needs.plan.outputs.commit }}
          files: |
            release/dbotter-preview-aarch64.tar.gz
            release/dbotter-preview-x86_64.tar.gz
            release/dbotter-preview-linux-aarch64
            release/dbotter-preview-linux-x86_64
            release/preview-manifest.json
            release/SHA256SUMS

  tap:
    needs: [verify, plan, publish]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      TAP_DISPATCH_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
    steps:
      - name: Dispatch exact immutable tap inputs
        env:
          GH_TOKEN: ${{ env.TAP_DISPATCH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$TAP_DISPATCH_TOKEN"
          gh workflow run bump.yml \
            --repo 2lab-ai/homebrew-tap \
            -f "tag=${{ needs.plan.outputs.tag }}" \
            -f "source_sha=${{ needs.plan.outputs.commit }}" \
            -f "version=${{ needs.plan.outputs.version }}" \
            -f "manifest_url=${{ needs.plan.outputs.manifest_url }}" \
            -f "manifest_sha256=${{ needs.publish.outputs.manifest_sha256 }}"
